{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="py-24 md:py-32">
    <div class="max-w-2xl mx-auto px-4 md:px-6 text-center">
        <div class="w-20 h-20 bg-olive-100 rounded-full flex items-center justify-center mx-auto mb-8">
            <svg class="w-10 h-10 text-olive-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="font-display text-3xl md:text-4xl font-bold text-terre-cuite-800">Message envoyé</h1>
        <div class="mt-6 text-gray-600 prose mx-auto">{{ page.merci_texte|richtext }}</div>
        <a href="/" class="mt-8 inline-flex items-center gap-2 text-terre-cuite-600 font-semibold hover:text-terre-cuite-700 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Retour à l'accueil
        </a>
    </div>
</section>
{% endblock %}
