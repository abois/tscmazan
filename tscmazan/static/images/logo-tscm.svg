<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D06020"/>
      <stop offset="100%" stop-color="#A04010"/>
    </linearGradient>
  </defs>

  <!-- Fond cercle -->
  <circle cx="256" cy="256" r="252" fill="url(#g1)"/>

  <!-- Bordure extérieure -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#F5CFA1" stroke-width="2.5" opacity="0.6"/>

  <!-- Bordure intérieure -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#F5CFA1" stroke-width="1" opacity="0.25"/>

  <!-- TSC -->
  <text x="256" y="225" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="140" fill="white" letter-spacing="12">TSC</text>

  <!-- Ligne gauche -->
  <line x1="90" y1="260" x2="225" y2="260" stroke="#F5B820" stroke-width="3" stroke-linecap="round"/>

  <!-- Balle -->
  <circle cx="256" cy="260" r="14" fill="#F5B820"/>
  <!-- Coutures balle -->
  <path d="M248 250 Q256 261, 251 272" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M264 250 Q256 261, 261 272" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Ligne droite -->
  <line x1="287" y1="260" x2="422" y2="260" stroke="#F5B820" stroke-width="3" stroke-linecap="round"/>

  <!-- MAZAN -->
  <text x="256" y="330" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="86" fill="white" letter-spacing="16">MAZAN</text>

  <!-- Texte arc haut -->
  <path id="arc-top" d="M 80 256 A 176 176 0 0 1 432 256" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" letter-spacing="6" opacity="0.5" font-weight="600">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">TENNIS SPORTING CLUB</textPath>
  </text>

  <!-- Texte arc bas -->
  <path id="arc-bot" d="M 88 272 A 176 176 0 0 0 424 272" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" letter-spacing="5" opacity="0.4" font-weight="600">
    <textPath href="#arc-bot" startOffset="50%" text-anchor="middle">MAZANAIS &#x2022; VAUCLUSE</textPath>
  </text>
</svg>
