  <path d="M249 240 Q256 249, 252 258" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <path d="M263 240 Q256 249, 260 258" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>

  <!-- Ligne droite -->
  <line x1="290" y1="248" x2="422" y2="248" stroke="#F5B820" stroke-width="2.5" stroke-linecap="round"/>

  <!-- MAZAN -->
  <text x="256" y="320" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="16">MAZAN</text>

  <!-- Texte arc haut -->
  <path id="arc-top" d="M 72 256 A 184 184 0 0 1 440 256" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" letter-spacing="6" opacity="0.45" font-weight="600">
