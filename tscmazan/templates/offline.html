{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors ligne — TSC Mazan</title>
    <meta name="theme-color" content="#2057b2">
    <link rel="icon" href="{% static 'images/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #faf8f5;
            color: #1f2937;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: #eef4fb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2057b2;
        }
        .icon svg { width: 36px; height: 36px; }
        .eyebrow {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #2057b2;
            margin-bottom: 0.75rem;
        }
        h1 {
            font-family: 'Bebas Neue', system-ui, sans-serif;
            font-size: 2rem;
            letter-spacing: 0.02em;
            color: #0a1a35;
            margin-bottom: 0.75rem;
            font-weight: 400;
            line-height: 1.1;
        }
        p {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 22rem;
            margin-left: auto;
            margin-right: auto;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #2057b2;
            color: white;
            border-radius: 0.6rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(32, 87, 178, 0.2);
        }
        .cta:hover { background: #1a4690; }
        .cta svg { width: 16px; height: 16px; }
    </style>
</head>
<body>
    <div>
        <div class="icon">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"/>
                <path stroke-linecap="round" stroke-width="2" d="M3 3l18 18"/>
            </svg>
        </div>
        <div class="eyebrow">Hors connexion</div>
        <h1>Pas de réseau</h1>
        <p>Vérifiez votre connexion internet et réessayez. Les pages déjà consultées restent disponibles.</p>
        <a href="/" class="cta" onclick="window.location.reload(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Réessayer
        </a>
    </div>
</body>
</html>
