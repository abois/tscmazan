{% comment %}
Génère un BreadcrumbList JSON-LD pour une page Wagtail intérieure.
Usage dans {% block extra_head %} :
  {% include "includes/breadcrumb_jsonld.html" %}
{% endcomment %}
{% if page %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Accueil",
      "item": "{{ request.scheme }}://{{ request.get_host }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title }}",
      "item": "{{ request.scheme }}://{{ request.get_host }}{{ page.url }}"
    }
  ]
}
</script>
{% endif %}
